<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <title>Edit Record</title>
  </head>
  <body>
    <div class="container mt-4">
      <h1>Edit Record</h1>
      <form method="post">
        <div class="mb-3">
          <label for="log_id" class="form-label">Log ID</label>
          <input
            type="text"
            id="log_id"
            name="log_id"
            class="form-control"
            value="{{ entry.log_id }}"
            readonly
          />
        </div>

        <div class="mb-3">
          <label for="date" class="form-label">Date</label>
          <input
            type="date"
            id="date"
            name="date"
            class="form-control"
            value="{{ entry.date }}"
          />
        </div>
        <div class="mb-3">
          <label for="time" class="form-label">Time</label>
          <input
            type="time"
            id="time"
            name="time"
            class="form-control"
            value="{{ entry.time }}"
          />
        </div>
        <div class="mb-3">
          <label for="diary" class="form-label">Diary</label>
          <textarea id="diary" name="diary" class="form-control" rows="5">
{{ entry.diary }}</textarea
          >
        </div>
        <div class="mb-3">
          <label class="form-label">Category</label><br />
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="checkbox" id="work"
            name="category" value="work" {% if 'work' in entry.categories
            %}checked{% endif %}>
            <label class="form-check-label" for="work">Work</label>
          </div>
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="checkbox" id="personal"
            name="category" value="personal" {% if 'personal' in
            entry.categories %}checked{% endif %}>
            <label class="form-check-label" for="personal">Personal</label>
          </div>
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="checkbox" id="exercise"
            name="category" value="exercise" {% if 'exercise' in
            entry.categories %}checked{% endif %}>
            <label class="form-check-label" for="exercise">Exercise</label>
          </div>
        </div>
        <div class="mb-3">
          <label for="date_created" class="form-label">Date Created</label>
          <input
            type="text"
            id="date_created"
            name="date_created"
            class="form-control"
            value="{{ entry.date_created }}"
            readonly
          />
        </div>
        <div class="mb-3">
          <label for="date_modified" class="form-label">Date Modified</label>
          <input
            type="text"
            id="date_modified"
            name="date_modified"
            class="form-control"
            value="{{ entry.date_modified }}"
            readonly
          />
        </div>
        <button type="submit" class="btn btn-primary">Update</button>
      </form>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
        const params = new URLSearchParams(window.location.search);
        if (!params.get("timezone")) {
          params.set("timezone", timezone);
          window.location.search = params.toString();
        }
      });
    </script>
  </body>
</html>
